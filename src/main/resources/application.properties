logging.config=classpath:logback-base.xml

pn.env.runtime=PROD
spring.application.name=PN-EMD-INTEGRATION
spring.main.web-application-type=REACTIVE

# Downstream services enabled
pn.emd-integration.enabled=${PN_EMDINTEGRATION_ISINTEGRATIONENABLED:true}

# CORS Configuration
cors.allowed.domains=http://localhost:8090,http://localhost:8091

# Management Endpoints
management.endpoints.web.exposure.include=health,metrics,loggers

management.endpoint.health.probes.enabled=true

# Redis (Spring Data + Lettuce)
logging.level.org.springframework.data.redis=DEBUG
logging.level.org.springframework.data.redis.connection=DEBUG
logging.level.org.springframework.data.redis.connection.lettuce=DEBUG
logging.level.io.lettuce.core=DEBUG
logging.level.io.lettuce.core.protocol=DEBUG

# Actuator / health endpoint
logging.level.org.springframework.boot.actuate.health=DEBUG
logging.level.org.springframework.boot.actuate.endpoint.web=DEBUG
logging.level.org.springframework.boot.actuate.redis=DEBUG
logging.level.org.springframework.web.server.adapter.HttpWebHandlerAdapter=DEBUG

# pn-commons (exception handler, logging, config Redis/IAM)
logging.level.it.pagopa.pn.commons.exceptions=DEBUG
logging.level.it.pagopa.pn.commons.log=DEBUG